<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOTO_AGEXT | Grade Planner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .grade-container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--surface-color);
      border-radius: var(--border-radius);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .terms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .term-card {
      background: rgba(255, 255, 255, 0.4);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(76, 175, 80, 0.2);
    }

    .term-title {
      font-weight: 600;
      color: var(--accent-color);
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .input-group {
      margin-bottom: 0.8rem;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 6px;
      outline: none;
      font-family: inherit;
    }

    .input-group input:focus {
      border-color: var(--accent-color);
    }

    .calc-section {
      background: rgba(76, 175, 80, 0.1);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      margin-top: 1rem;
    }

    .calc-section label {
      font-weight: 600;
      color: var(--accent-color);
    }

    .primary-btn {
      background: linear-gradient(135deg, #1b5e20, #4caf50);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 25px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
    }

    .result-box {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .result-low {
      background: rgba(255, 193, 7, 0.15);
      border-left: 4px solid #ffb300;
      margin-bottom: 1rem;
    }

    .result-good {
      background: rgba(76, 175, 80, 0.15);
      border-left: 4px solid #4caf50;
    }

    .result-danger {
      background: rgba(244, 67, 54, 0.15);
      border-left: 4px solid #f44336;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <ul class="background-bubbles">
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>

  <nav class="navbar">
    <a href="index.html" class="logo">PHOTO_AGEXT</a>
    <div class="nav-links">
      <a href="index.html">Gallery</a>
      <a href="documents.html">เอกสารต่างๆ</a>
      <a href="grade.html">ระบบตรวจเกรด</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>ระบบวิเคราะห์เกรด (Probation)</h1>
      <p>คำนวณเป้าหมายเพื่อรอดโปรต่ำและพ้นโปร</p>
    </div>

    <div class="grade-container">
      <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
        * คุณสามารถกรอก <strong>"เกรดเฉลี่ยและหน่วยกิตปัจจุบัน"</strong> ในกล่องด่วนด้านล่าง
      </p>

      <form id="gradeForm">
        <div class="calc-section" style="margin-bottom: 2rem; background: rgba(255, 193, 7, 0.1);">
          <h3 style="margin-bottom: 1rem; color: #f57f17;"><i class="fas fa-bolt"></i> กรอกเกรดเเละหน่วยกิตปัจจุบัน
          </h3>
          <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <div class="input-group" style="text-align: left; max-width: 200px;">
              <label for="quickCreds" style="color: #f57f17;">หน่วยกิตสะสม ตอนนี้ *</label>
              <input type="number" id="quickCreds" min="0" step="1" placeholder="เช่น 45">
            </div>
            <div class="input-group" style="text-align: left; max-width: 200px;">
              <label for="quickGPA" style="color: #f57f17;">เกรดเฉลี่ยสะสม ตอนนี้ *</label>
              <input type="number" id="quickGPA" min="0" max="4.00" step="0.01" placeholder="เช่น 1.68">
            </div>
          </div>
        </div>

        <h3
          style="margin-bottom: 1rem; color: var(--text-primary); border-bottom: 2px solid rgba(76,175,80,0.2); padding-bottom: 0.5rem;">
          หน่วยกิตในเทอมหน้า</h3>
        <div class="terms-grid" id="termsGrid">
          <!-- Terms generated by JS -->
        </div>

        <div class="calc-section">
          <div class="input-group" style="max-width: 300px; margin: 0 auto; text-align: left;">
            <label for="nextCredits">หน่วยกิตที่จะลงทะเบียนในเทอมถัดไป *</label>
            <input type="number" id="nextCredits" min="1" max="25" step="1" required placeholder="เช่น 15, 18, 21">
          </div>

          <button type="submit" class="primary-btn">
            <i class="fas fa-calculator"></i> คำนวณเป้าหมายเทอมหน้า
          </button>
        </div>
      </form>

      <!-- Results Display -->
      <div id="resultBox"></div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="creator-info">
        <p>Created by <strong>Your Name</strong></p>
      </div>
      <div class="social-links">
        <a href="https://instagram.com" target="_blank" class="social-btn ig" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </div>
  </footer>

  <script src="grade.js"></script>
</body>

</html>
