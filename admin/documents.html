<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOTO_AGEXT | Add Document</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <ul class="background-bubbles">
    <li></li><li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>

  <nav class="navbar">
    <span class="logo">PHOTO_AGEXT (Admin)</span>
    <div class="nav-links">
      <a href="index.html">จัดการรูปภาพ</a>
      <a href="documents.html">จัดการเอกสาร</a>
      <a href="../index.html" style="opacity: 0.7;">กลับหน้าบ้าน</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>เพิ่มเอกสารใหม่</h1>
      <p>แปะลิงก์ Google Drive สำคัญสำหรับเผยแพร่ในหน้าเอกสารต่างๆ</p>
    </div>

    <div class="admin-card">
      <form id="addLinkForm">

        <div class="form-group">
          <label for="collectionName">ชื่อเอกสาร</label>
          <input type="text" id="collectionName" class="form-control" placeholder="เช่น สไลด์เรียนบทที่ 1 หรือ คู่มือ..." required
            autocomplete="off">
        </div>

        <div class="form-group">
          <label for="driveUrl">ลิงก์ดาวน์โหลด</label>
          <input type="url" id="driveUrl" class="form-control" placeholder="https://drive.google.com/..."
            required autocomplete="off">
        </div>

        <button type="submit" class="submit-btn" style="background-color: var(--accent-color);">
          <i class="fas fa-file-upload" style="margin-right: 8px;"></i> อัปโหลดเอกสาร
        </button>

      </form>

      <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle" style="margin-right: 8px;"></i> เพิ่มเอกสารสำเร็จ!
      </div>
    </div>

    <!-- Management List -->
    <div class="admin-list-card" style="margin-top: 2rem;">
      <h2>จัดการเอกสาร</h2>
      <div id="adminList" class="admin-list"></div>
    </div>
  </main>

  <footer class="footer">
  </footer>

  <script src="documents.js"></script>
</body>

</html>
